apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: view-vedtak-privat-bil
  namespace: tilleggsstonader
  labels:
    team: tilleggsstonader
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: merge
    cnrm.cloud.google.com/project-id: {{project}}
spec:
  resourceID: view_vedtak_privat_bil
  description: "View som viser alle daglig-reise vedtak med privat bil"
  datasetRef:
    external: datastream_tilleggsstonader_sak
  view:
    useLegacySql: false
    query: >-
      SELECT
          v.behandling_id,
          (r.reise ->> 'reiseId')::uuid AS reise_id,
          (r.reise -> 'grunnlag' ->> 'fom')::date AS fom,
          (r.reise -> 'grunnlag' ->> 'tom')::date AS tom,
          (r.reise -> 'grunnlag' ->> 'reiseavstandEnVei')::numeric AS reiseavstand_en_vei,
          jsonb_array_length(r.reise -> 'grunnlag' -> 'delperioder') AS antall_delperioder
      FROM datastream_tilleggsstonader_sak.public_vedtak v
               CROSS JOIN LATERAL jsonb_array_elements(v.data -> 'rammevedtakPrivatBil' -> 'reiser') AS r(reise)
      WHERE v.data ->> 'type' IN ('INNVILGELSE_DAGLIG_REISE', 'OPPHØR_DAGLIG_REISE')