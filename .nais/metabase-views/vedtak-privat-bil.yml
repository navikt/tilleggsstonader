apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: view-vedtak-privat-bil
  namespace: tilleggsstonader
  labels:
    team: tilleggsstonader
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: merge
    cnrm.cloud.google.com/project-id: {{project}}
spec:
  resourceID: view_vedtak_privat_bil
  description: "View som viser alle daglig-reise vedtak med privat bil"
  datasetRef:
    external: datastream_tilleggsstonader_sak
  view:
    useLegacySql: false
    query: >-
      SELECT
          v.behandling_id,
          JSON_VALUE(reise, '$.reiseId') AS reise_id,
          DATE(JSON_VALUE(reise, '$.grunnlag.fom')) AS fom,
          DATE(JSON_VALUE(reise, '$.grunnlag.tom')) AS tom,
          SAFE_CAST(JSON_VALUE(reise, '$.grunnlag.reiseavstandEnVei') AS NUMERIC) AS reiseavstand_en_vei,
          ARRAY_LENGTH(JSON_QUERY_ARRAY(reise, '$.grunnlag.delperioder')) AS antall_delperioder
      FROM datastream_tilleggsstonader_sak.public_vedtak v
               CROSS JOIN UNNEST(JSON_QUERY_ARRAY(v.data, '$.rammevedtakPrivatBil.reiser')) AS reise
      WHERE JSON_VALUE(v.data, '$.type') IN ('INNVILGELSE_DAGLIG_REISE', 'OPPHØR_DAGLIG_REISE')
