apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: view-vedtak-offentlig-transport
  namespace: tilleggsstonader
  labels:
    team: tilleggsstonader
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: merge
    cnrm.cloud.google.com/project-id: {{project}}
spec:
  resourceID: view_vedtak_offentlig-transport
  description: "View som viser alle daglig-reise vedtak med offentlig transport"
  datasetRef:
    external: datastream_tilleggsstonader_sak
  view:
    useLegacySql: false
    query: >-
      SELECT v.behandling_id,
             JSON_VALUE(reise, '$.reiseId')                           AS reise_id,
             MIN(DATE(JSON_VALUE(periode, '$.grunnlag.fom')))         AS fom,
             MAX(DATE(JSON_VALUE(periode, '$.grunnlag.tom')))         AS tom,
             SUM(SAFE_CAST(JSON_VALUE(periode, '$."beløp"') AS NUMERIC)) AS belop
      FROM datastream_tilleggsstonader_sak.public_vedtak v
               CROSS JOIN UNNEST(JSON_QUERY_ARRAY(v.data, '$.beregningsresultat.offentligTransport.reiser')) AS reise
               CROSS JOIN UNNEST(JSON_QUERY_ARRAY(reise, '$.perioder')) AS periode
      WHERE JSON_VALUE(v.data, '$.type') IN ('INNVILGELSE_DAGLIG_REISE', 'OPPHØR_DAGLIG_REISE')
      GROUP BY v.behandling_id, JSON_VALUE(reise, '$.reiseId');
