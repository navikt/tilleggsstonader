name: Deploy BigQuery Resources

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string
      project:
        required: true
        type: string

jobs:
  deploy-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: ${{ inputs.cluster }}
          RESOURCE: "\
            .nais/metabase-views/avslag-arsaker.yml,\
            .nais/metabase-views/sett-pa-vent-arsaker.yml,\
            .nais/metabase-views/sett-pa-vent-varighet.yml,\
            .nais/metabase-views/totrinn-arsaker-til-retur.yml,\
            .nais/metabase-views/vedtak-offentlig-transport.yml,\
            .nais/metabase-views/vedtak-privat-bil.yml,\
            .nais/metabase-views/saksbehandling.yml"
          VAR: project=${{ inputs.project }}
          PRINT_PAYLOAD: true
