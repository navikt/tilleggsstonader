name: Deploy alerts til dev og prod
on:
  push:
    branches:
      - main
    paths:
      - '.nais/alerts.yaml'
      - '.nais/alertmanager-config-dev.yaml'
      - '.nais/alertmanager-config-prod.yaml'
      - '.github/workflows/deploy-alerts.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply-alerts:
    name: Apply alerts til dev og prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Deploy alerts til dev
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/alerts.yaml
      - name: Deploy alertmanager config til dev
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/alertmanager-config-dev.yaml
      - name: Deploy alertmanager config til prod
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/alertmanager-config-prod.yaml
      - name: Deploy alerts til prod
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/alerts.yaml
