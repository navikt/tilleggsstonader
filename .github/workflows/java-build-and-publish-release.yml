name: Bygg og publiser pakke på GitHub Packages
on:
  workflow_call:
    inputs:
      { }

# ------------------------------------------------------------
# Denne workflowen oppretter en utgivelse og publiserer den på GitHub Packages.
#
# Det er påkrevd at kallende GitHub Actions-jobb setter følgende rettigheter:
#
# permissions:
#   contents: "write"
#   packages: "write"
# ------------------------------------------------------------

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: "Bygg og test applikasjonen"
        run: ./gradlew build -PskipLint

  release:
    name: "Opprett og publiser pakke"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: "Sjekk ut koden"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Sett versjonstag"
        run: |
          BASE_VERSION="$(TZ="Europe/Oslo" date +%Y.%m.%d-%H.%M).$(git rev-parse --short=12 HEAD)"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            export TAG_NAME="$BASE_VERSION"
          else
            export TAG_NAME="$BASE_VERSION-dev"
          fi
          echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV

      - name: "Sett endringslogg"
        id: changelog
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            text="$(git --no-pager log $last_tag..HEAD --pretty=format:'- %h %s')"
          else
            text="$(git --no-pager log --pretty=format:'- %h %s')"
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$text"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: "Publiser pakke"
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          name: Release ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Sett opp Gradle"
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph: generate-and-submit

      - name: "Publiser pakke til GitHub Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -Pversion=${{ env.RELEASE_TAG }} publish
