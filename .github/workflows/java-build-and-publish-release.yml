name: Bygg og publiser pakke på GitHub Packages
on:
  workflow_call:
    inputs:
      { }

# ------------------------------------------------------------
# Denne workflowen oppretter en utgivelse og publiserer den på GitHub Packages.
#
# Det er påkrevd at kallende GitHub Actions-jobb setter følgende rettigheter:
#
# permissions:
#   contents: "write"
#   packages: "write"
# ------------------------------------------------------------

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: "Bygg og test applikasjonen"
        run: ./gradlew build -PskipLint

  release:
    name: "Opprett og publiser pakke"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: "Sjekk ut koden"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: "Sett versjonstag"
        run: |
          BASE_VERSION="$(TZ="Europe/Oslo" date +%Y.%m.%d-%H.%M).$(git rev-parse --short=12 HEAD)"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            export TAG_NAME="$BASE_VERSION"
          else
            export TAG_NAME="$BASE_VERSION-dev"
          fi
          echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV

      - name: "Sett endringslogg"
        id: changelog
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            text="$(git --no-pager log $last_tag..HEAD --pretty=format:'- %h %s')"
          else
            text="$(git --no-pager log --pretty=format:'- %h %s')"
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$text"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: "Publiser pakke"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          name: Release ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Sett opp Gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          dependency-graph: generate-and-submit

      - name: "Publiser pakke til GitHub Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -Pversion=${{ env.RELEASE_TAG }} publish
